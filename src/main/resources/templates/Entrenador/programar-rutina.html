<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Programar Rutina - FlowFit</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- FlowFit CSS -->
  <link th:href="@{/css/flowfit-base.css}" rel="stylesheet">
  <link th:href="@{/css/flowfit-entrenador.css}" rel="stylesheet">

  <!-- FullCalendar -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
</head>
<body>

  <!-- Mobile Toggle -->
  <button class="sidebar-toggle-base sidebar-toggle-entrenador d-md-none" id="sidebarToggle">
    <i class="bi bi-list fs-4"></i>
  </button>

  <!-- Sidebar Overlay for Mobile -->
  <div class="sidebar-overlay-base" id="sidebarOverlay"></div>

  <!-- Sidebar -->
  <div th:replace="~{fragments/sidebar-entrenador :: sidebar}"></div>

  <main class="main-content-base fade-in-up">
    <div class="container-fluid">

      <div class="welcome-header-enhanced">
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-3">
          <div>
            <h1 class="text-white fw-bold mb-1">Programar Rutina</h1>
            <p class="text-muted-flowfit mb-0">
              <span th:text="${rutina.nombre}">Rutina</span>
              <span class="mx-2">•</span>
              <span th:text="${asignacion.usuario != null ? asignacion.usuario.nombre : ('Usuario #' + asignacion.usuarioId)}">Usuario</span>
            </p>
          </div>
          <div class="d-flex gap-2">
            <a class="btn btn-entrenador-outline" th:href="@{/entrenador/asignar-rutinas}">
              <i class="bi bi-arrow-left me-2"></i>Volver
            </a>
          </div>
        </div>
      </div>

      <div class="card-base card-entrenador">
        <div class="card-body p-4">
          <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-3">
            <h4 class="text-white fw-bold mb-0 d-flex align-items-center">
              <i class="bi bi-calendar-week me-2 text-primary"></i>
              Calendario
            </h4>
            <span class="text-muted-flowfit small">Clic en un día → elegir plantilla → guardar</span>
          </div>
          <div id="calendarEntrenadorProgramacion"></div>
        </div>
      </div>

    </div>
  </main>

  <!-- Modal: Programar día -->
  <div class="modal fade" id="modalProgramarDia" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content" style="background: rgba(15, 23, 42, 0.98); border: 1px solid rgba(59, 130, 246, 0.25); border-radius: 16px;">
        <div class="modal-header" style="border-bottom: 1px solid rgba(255, 255, 255, 0.08);">
          <h5 class="modal-title text-white fw-bold">Programar fecha</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="d-flex align-items-center justify-content-between mb-3">
            <div class="text-muted-flowfit small">Fecha</div>
            <div class="text-white" data-ff-fecha>—</div>
          </div>

          <label class="form-label text-muted-flowfit small mb-2">Plantilla del día</label>
          <select class="form-select" id="selectDiaPlantilla" style="background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.12); color: #e2e8f0;">
            <option value="">Sin programar</option>
          </select>

          <div class="mt-3">
            <div class="text-muted-flowfit small">Estado</div>
            <div class="text-white" data-ff-estado>—</div>
          </div>

          <div class="alert alert-warning mt-3 py-2 px-3 d-none" role="alert" id="programarWarn" style="background: rgba(245, 158, 11, 0.12); border: 1px solid rgba(245, 158, 11, 0.25); color: #f59e0b;">
            <i class="bi bi-exclamation-triangle me-2"></i>
            <span id="programarWarnText"></span>
          </div>
        </div>
        <div class="modal-footer" style="border-top: 1px solid rgba(255, 255, 255, 0.08);">
          <button type="button" class="btn btn-entrenador-outline" data-bs-dismiss="modal">Cerrar</button>
          <button type="button" class="btn btn-entrenador-primary" id="btnGuardarProgramacion">
            <i class="bi bi-save me-2"></i>Guardar
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- FullCalendar JS -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

  <!-- FlowFit Common JS -->
  <script th:src="@{/js/sidebar-common.js}"></script>

  <script th:inline="javascript">
    window.FF_ASIGNACION_ID = /*[[${asignacion.id}]]*/ 0;
    window.FF_DIAS_OPTIONS = /*[[${diasOptions}]]*/ [];
    window.FF_VALID_START = /*[[${programacionInicio}]]*/ null;
    window.FF_VALID_END_EXCL = /*[[${programacionFin != null ? programacionFin.plusDays(1) : null}]]*/ null;
  </script>

  <script th:src="@{/js/entrenador-programar-rutina.js}"></script>
</body>
</html>
