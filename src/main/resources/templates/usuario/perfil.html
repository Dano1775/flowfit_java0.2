<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - FlowFit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- FlowFit VIP CSS -->
    <link th:href="@{/css/flowfit-base.css}" rel="stylesheet">
    <link th:href="@{/css/flowfit-usuario.css}" rel="stylesheet">
</head>
<body class="flowfit-body usuario-body">

  <!-- Reusable user sidebar fragment -->
  <div th:replace="~{fragments/sidebar-usuario :: sidebar}"></div>
  <!-- Sidebar Overlay for Mobile (único) -->
  <div class="flowfit-sidebar-overlay d-lg-none" id="sidebarOverlay"></div>

  <!-- Sidebar Toggle Button for Mobile (único) -->
  <button class="flowfit-sidebar-toggle sidebar-toggle-usuario d-lg-none" id="sidebarToggle">
    <i class="bi bi-list"></i>
  </button>

  <!-- Main Content -->
  <main class="main-content-base fade-in-up">
    <div class="container-fluid">
      <!-- Header Section -->
      <div class="welcome-header-enhanced mb-4">
        <div class="row align-items-center">
          <div class="col-lg-8">
            <h1 class="display-6 mb-2 text-white fw-bold">
              <i class="bi bi-person-circle me-2"></i>Mi Perfil
            </h1>
            <p class="lead text-white-50">Gestiona tu información personal y configuración</p>
          </div>
          <div class="col-lg-4 text-lg-end">
            <a class="btn-flowfit-primary btn-usuario-primary btn-enhanced" th:href="@{/editar-perfil}">
              <i class="bi bi-pencil-square me-2"></i>Editar Perfil
            </a>
          </div>
        </div>
      </div>

      <!-- Alert Messages -->
      <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>

      <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-circle me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>

      <!-- Profile Information -->
      <div class="row">
        <div class="col-lg-12">
          <div class="card-base card-usuario">
            <div class="card-header">
                <h5 class="card-title mb-0 text-white">
                    <i class="bi bi-person-vcard me-2"></i>
                    Información Personal
                </h5>
            </div>
            <div class="card-body">
              <div class="row g-3">
                <div class="col-md-6">
                  <div class="small text-white-50">Nombre Completo</div>
                  <div class="text-white fw-semibold" th:text="${usuario.nombre}">-</div>
                </div>
                <div class="col-md-6">
                  <div class="small text-white-50">Número de Documento</div>
                  <div class="text-white fw-semibold" th:text="${usuario.numeroDocumento}">-</div>
                </div>
                <div class="col-md-6">
                  <div class="small text-white-50">Correo Electrónico</div>
                  <div class="text-white fw-semibold" th:text="${usuario.correo}">-</div>
                </div>
                <div class="col-md-6">
                  <div class="small text-white-50">Teléfono</div>
                  <div class="text-white fw-semibold" th:text="${usuario.telefono}">-</div>
                </div>
                <div class="col-md-6">
                  <div class="small text-white-50">Tipo de Usuario</div>
                  <div class="text-white fw-semibold" th:text="${usuario.perfilUsuario}">-</div>
                </div>
                <div class="col-md-6">
                  <div class="small text-white-50">Estado</div>
                  <div>
                    <span class="badge bg-success fs-6" th:if="${usuario.estado == 'A'}">Activo</span>
                    <span class="badge bg-warning fs-6" th:if="${usuario.estado == 'I'}">Inactivo</span>
                    <span class="badge bg-secondary fs-6" th:if="${usuario.estado == 'P'}">Pendiente</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <footer class="footer-base mt-5">© 2025 FlowFit</footer>
    </div> <!-- Cierre container-fluid -->
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Sidebar Responsive JS -->
  <!-- FlowFit VIP Usuario Script -->
  <!-- JS compartido del sidebar -->
  <script th:src="@{/js/sidebar-common.js}"></script>
</body>
</html>
