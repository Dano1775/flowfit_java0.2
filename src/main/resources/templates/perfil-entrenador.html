<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Perfil - FlowFit</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <link th:href="@{/css/flowfit-base.css}" rel="stylesheet">
  <link th:href="@{/css/flowfit-entrenador.css}" rel="stylesheet">
</head>
<body>

  <div th:replace="~{fragments/sidebar-entrenador :: sidebar}"></div>
  <div class="sidebar-overlay-base" id="sidebarOverlay"></div>

  <button class="sidebar-toggle-base sidebar-toggle-entrenador d-md-none" id="sidebarToggle">
    <i class="bi bi-list fs-4"></i>
  </button>

  <main class="main-content-base fade-in-up">
    <div class="container-fluid">
      <div class="welcome-header-enhanced mb-4">
        <div class="row align-items-center">
          <div class="col-lg-8">
            <h1 class="display-6 mb-2 text-white fw-bold">
              <i class="bi bi-person-circle me-2"></i>Mi Perfil
            </h1>
            <p class="lead text-white-50">Gestiona tu información personal</p>
          </div>
          <div class="col-lg-4 text-lg-end">
            <a class="btn-flowfit-primary btn-entrenador-primary btn-enhanced" th:href="@{/perfil/editar}">
              <i class="bi bi-pencil-square me-2"></i>Editar Perfil
            </a>
          </div>
        </div>
      </div>

      <div class="card-base card-entrenador">
        <div class="card-body">
          <div class="row g-3">
            <div class="col-md-6">
              <div class="small text-white-50">Nombre</div>
              <div class="text-white fw-semibold" th:text="${usuario.nombre}">-</div>
            </div>
            <div class="col-md-6">
              <div class="small text-white-50">Correo</div>
              <div class="text-white fw-semibold" th:text="${usuario.correo}">-</div>
            </div>
            <div class="col-md-6">
              <div class="small text-white-50">Teléfono</div>
              <div class="text-white fw-semibold" th:text="${usuario.telefono}">-</div>
            </div>
            <div class="col-md-6">
              <div class="small text-white-50">Documento</div>
              <div class="text-white fw-semibold" th:text="${usuario.numeroDocumento}">-</div>
            </div>
            <div class="col-md-6">
              <div class="small text-white-50">Rol</div>
              <div class="text-white fw-semibold" th:text="${usuario.perfilUsuario}">Entrenador</div>
            </div>
          </div>
        </div>
      </div>

      <footer class="footer-base mt-5">© 2025 FlowFit</footer>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script th:src="@{/js/sidebar-common.js}"></script>
</body>
</html>
